<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenHouse Map — בקרוב</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    :root {
      --deep: #141C0A;
      --moss: #4A6E30;
      --sage: #8AB060;
      --ivory: #F6F8F2;
      --cream: #F0E8D0;
    }
    @media (prefers-color-scheme: dark) {
      :root { --ivory: #0C1208; --deep: #F0E8D0; }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      background: var(--ivory);
      color: var(--deep);
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      text-align: center;
    }
    h1 { font-size: clamp(2rem, 5vw, 4rem); margin: 0; letter-spacing: -0.02em; }
    p { color: var(--moss); font-size: 1.125rem; margin: 0; max-width: 30rem; }
    .tag { display: inline-block; padding: 0.4rem 0.9rem; border-radius: 999px; background: var(--cream); color: var(--moss); font-size: 0.875rem; }
  </style>
</head>
<body>
  <span class="tag">בקרוב</span>
  <h1>OpenHouse Map</h1>
  <p>כל הבתים הפתוחים — במקום אחד</p>
  <p style="opacity:.6;font-size:0.9rem">National map of open house events for Israeli real estate agents.</p>
</body>
</html>
